<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Embedded & IoT Learning Hub</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 40px;
        letter-spacing: 2px;
    }

    p {
        color: #ccc;
        margin-bottom: 40px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
    }

    .card {
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 30px;
        transition: 0.3s;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
        background: rgba(255,255,255,0.2);
    }

    .card h2 {
        margin-bottom: 15px;
    }

    .card a {
        text-decoration: none;
        color: white;
        background: #00c6ff;
        padding: 10px 20px;
        border-radius: 25px;
        display: inline-block;
        transition: 0.3s;
    }

    .card a:hover {
        background: #0072ff;
    }

    footer {
        margin: 20px;
        color: #aaa;
    }
</style>
</head>

<body>

<h1>🚀 Embedded & IoT Learning Hub</h1>
<p>Navigate through all your codes and resources</p>

<div class="container">

    <div class="card">
        <h2>📘 Embedded C Basics</h2>
        <a href="https://chandramouli001.github.io/Embedded_IoT_BCT/Web%20Pages/embeddedc.html">Open</a>
    </div>

    <div class="card">
        <h2>⚙️ Embedded C Intermediate</h2>
        <a href="https://chandramouli001.github.io/Embedded_IoT_BCT/Web%20Pages/embedded_c_intermediate.html">Open</a>
    </div>

    <div class="card">
        <h2>🔌 Arduino Basics</h2>
        <a href="https://chandramouli001.github.io/Embedded_IoT_BCT/Web%20Pages/basicArduino.html">Open</a>
    </div>

    <div class="card">
        <h2>🤖 Arduino Intermediate</h2>
        <a href="https://chandramouli001.github.io/Embedded_IoT_BCT/Web%20Pages/intermediate.html">Open</a>
    </div>

</div>

<footer>
    © 2026 | Designed with 💙 by Chandramouli
</footer>

</body>
</html>
