<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arduino Programming – Intermediate</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2333;
    --border: #30363d;
    --accent: #00e5a0;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --text: #e6edf3;
    --muted: #8b949e;
    --circuit: #00e5a020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, #00e5a015, transparent),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg stroke='%2300e5a0' stroke-width='0.3' opacity='0.08'%3E%3Cpath d='M0 30h60M30 0v60'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 20px auto 0;
  }

  .badge {
    display: inline-block;
    background: #00e5a015;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px #00e5a018;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1)  { animation-delay: 0.05s; }
  .card:nth-child(2)  { animation-delay: 0.10s; }
  .card:nth-child(3)  { animation-delay: 0.15s; }
  .card:nth-child(4)  { animation-delay: 0.20s; }
  .card:nth-child(5)  { animation-delay: 0.25s; }
  .card:nth-child(6)  { animation-delay: 0.30s; }
  .card:nth-child(7)  { animation-delay: 0.35s; }
  .card:nth-child(8)  { animation-delay: 0.40s; }
  .card:nth-child(9)  { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.60s; }
  .card:nth-child(13) { animation-delay: 0.65s; }
  .card:nth-child(14) { animation-delay: 0.70s; }
  .card:nth-child(15) { animation-delay: 0.75s; }

  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .ex-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: #00e5a015;
    border: 1px solid #00e5a040;
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    margin-top: 3px;
  }

  .card-header-text h2 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }

  .desc {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #12171f;
  }

  .tab {
    padding: 9px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  pre {
    background: #0d1117;
    color: #d4d4d4;
    padding: 18px 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    margin: 0;
  }

  .circuit-box {
    background: #0b1a14;
    border-top: 1px solid #00e5a025;
    padding: 18px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #a8d8c0;
  }

  .circuit-box .circuit-title {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .circuit-box .circuit-title::before {
    content: '⬡';
    font-size: 14px;
  }

  .circuit-row {
    display: flex;
    gap: 8px;
    padding: 3px 0;
  }

  .pin { color: var(--accent2); font-weight: 700; }
  .arrow { color: var(--accent3); }
  .component { color: #e6c87a; }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    background: #12171f;
  }

  .copy-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 16px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: var(--accent);
    color: #000;
  }

  .copy-btn.copied {
    background: var(--accent);
    color: #000;
  }

  /* Syntax colors */
  .kw  { color: #569cd6; }
  .ty  { color: #4ec9b0; }
  .nm  { color: #b5cea8; }
  .st  { color: #ce9178; }
  .cm  { color: #6a9955; font-style: italic; }
  .fn  { color: #dcdcaa; }
  .pp  { color: #c586c0; }
</style>
</head>
<body>

<header>
  <div class="badge">ARDUINO</div>
  <h1>Intermediate Programming</h1>
  <p class="subtitle">// 15 circuit examples with wiring guide</p>
</header>

<div class="container" id="programs"></div>

<script>
const programs = [
  {
    title: "Potentiometer Reading",
    desc: "Reads analog value from pot → Serial Monitor",
    code: `<span class="kw">void</span> <span class="fn">setup</span>() {
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> val = <span class="fn">analogRead</span>(A0);
  Serial.<span class="fn">println</span>(val);
  <span class="fn">delay</span>(<span class="nm">300</span>);
}`,
    circuit: [
      ["Pot LEFT pin", "→", "GND"],
      ["Pot RIGHT pin", "→", "5V"],
      ["Pot MIDDLE (wiper)", "→", "A0"],
    ]
  },
  {
    title: "LED Brightness via Potentiometer",
    desc: "PWM-controls LED brightness from pot input",
    code: `<span class="ty">int</span> led = <span class="nm">9</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(led, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> v = <span class="fn">analogRead</span>(A0);
  v = <span class="fn">map</span>(v, <span class="nm">0</span>, <span class="nm">1023</span>, <span class="nm">0</span>, <span class="nm">255</span>);
  <span class="fn">analogWrite</span>(led, v);
}`,
    circuit: [
      ["Pot WIPER", "→", "A0"],
      ["LED Anode (+)", "→", "Pin 9 (PWM)"],
      ["LED Cathode (−)", "→", "220Ω → GND"],
    ]
  },
  {
    title: "7-Segment Display Counter",
    desc: "Counts 0–9 on a 7-segment display",
    code: `<span class="ty">int</span> seg[] = {<span class="nm">2</span>,<span class="nm">3</span>,<span class="nm">4</span>,<span class="nm">5</span>,<span class="nm">6</span>,<span class="nm">7</span>,<span class="nm">8</span>};

<span class="ty">byte</span> num[<span class="nm">10</span>][<span class="nm">7</span>] = {
  {<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>},{<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">0</span>},
  {<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>},{<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">1</span>},
  {<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>},{<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>},
  {<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>},{<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">0</span>,<span class="nm">0</span>},
  {<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>},{<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">1</span>,<span class="nm">0</span>,<span class="nm">1</span>,<span class="nm">1</span>}
};

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<<span class="nm">7</span>;i++) <span class="fn">pinMode</span>(seg[i],OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="kw">for</span>(<span class="ty">int</span> n=<span class="nm">0</span>;n<<span class="nm">10</span>;n++){
    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<<span class="nm">7</span>;i++)
      <span class="fn">digitalWrite</span>(seg[i], num[n][i]);
    <span class="fn">delay</span>(<span class="nm">700</span>);
  }
}`,
    circuit: [
      ["Segment a–g pins", "→", "Pins 2–8 via 220Ω resistors"],
      ["Common cathode", "→", "GND"],
      ["Segments (a,b,c,d,e,f,g)", "→", "Pins (2,3,4,5,6,7,8)"],
    ]
  },
  {
    title: "LCD Display via I2C",
    desc: "Displays text on a 16×2 LCD using I2C",
    code: `<span class="pp">#include</span> &lt;LiquidCrystal_I2C.h&gt;

<span class="cm">// SDA → A4  |  SCL → A5</span>
LiquidCrystal_I2C lcd(<span class="nm">0x27</span>, <span class="nm">16</span>, <span class="nm">2</span>);

<span class="kw">void</span> <span class="fn">setup</span>() {
  lcd.<span class="fn">init</span>();
  lcd.<span class="fn">backlight</span>();
  lcd.<span class="fn">setCursor</span>(<span class="nm">0</span>, <span class="nm">0</span>);
  lcd.<span class="fn">print</span>(<span class="st">"Hello Arduino"</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() { }`,
    circuit: [
      ["LCD VCC", "→", "5V"],
      ["LCD GND", "→", "GND"],
      ["LCD SDA", "→", "A4"],
      ["LCD SCL", "→", "A5"],
    ]
  },
  {
    title: "LCD Counter via I2C",
    desc: "Increments a counter on I2C LCD every second",
    code: `<span class="pp">#include</span> &lt;LiquidCrystal_I2C.h&gt;

LiquidCrystal_I2C lcd(<span class="nm">0x27</span>, <span class="nm">16</span>, <span class="nm">2</span>);
<span class="ty">int</span> c = <span class="nm">0</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  lcd.<span class="fn">init</span>();
  lcd.<span class="fn">backlight</span>();
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  lcd.<span class="fn">clear</span>();
  lcd.<span class="fn">setCursor</span>(<span class="nm">0</span>, <span class="nm">0</span>);
  lcd.<span class="fn">print</span>(c++);
  <span class="fn">delay</span>(<span class="nm">1000</span>);
}`,
    circuit: [
      ["LCD SDA", "→", "A4"],
      ["LCD SCL", "→", "A5"],
      ["LCD VCC/GND", "→", "5V / GND"],
    ]
  },
  {
    title: "Servo Motor – Fixed Angles",
    desc: "Moves servo to 0° and 90° alternately",
    code: `<span class="pp">#include</span> &lt;Servo.h&gt;
Servo s;

<span class="kw">void</span> <span class="fn">setup</span>() {
  s.<span class="fn">attach</span>(<span class="nm">9</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  s.<span class="fn">write</span>(<span class="nm">0</span>);   <span class="fn">delay</span>(<span class="nm">1000</span>);
  s.<span class="fn">write</span>(<span class="nm">90</span>);  <span class="fn">delay</span>(<span class="nm">1000</span>);
}`,
    circuit: [
      ["Servo BROWN (GND)", "→", "GND"],
      ["Servo RED (VCC)", "→", "5V"],
      ["Servo ORANGE (Signal)", "→", "Pin 9"],
    ]
  },
  {
    title: "Servo via Potentiometer",
    desc: "Pot controls servo angle (0–180°)",
    code: `<span class="pp">#include</span> &lt;Servo.h&gt;
Servo s;

<span class="kw">void</span> <span class="fn">setup</span>() {
  s.<span class="fn">attach</span>(<span class="nm">9</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> v = <span class="fn">analogRead</span>(A0);
  v = <span class="fn">map</span>(v, <span class="nm">0</span>, <span class="nm">1023</span>, <span class="nm">0</span>, <span class="nm">180</span>);
  s.<span class="fn">write</span>(v);
}`,
    circuit: [
      ["Pot WIPER", "→", "A0"],
      ["Servo Signal", "→", "Pin 9"],
      ["Servo VCC / GND", "→", "5V / GND"],
    ]
  },
  {
    title: "Ultrasonic Distance Sensor",
    desc: "Measures distance in cm using HC-SR04",
    code: `<span class="ty">int</span> trig=<span class="nm">9</span>, echo=<span class="nm">10</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(trig, OUTPUT);
  <span class="fn">pinMode</span>(echo, INPUT);
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="fn">digitalWrite</span>(trig, LOW);  <span class="fn">delayMicroseconds</span>(<span class="nm">2</span>);
  <span class="fn">digitalWrite</span>(trig, HIGH); <span class="fn">delayMicroseconds</span>(<span class="nm">10</span>);
  <span class="fn">digitalWrite</span>(trig, LOW);
  <span class="ty">long</span> d = <span class="fn">pulseIn</span>(echo, HIGH);
  Serial.<span class="fn">println</span>(d / <span class="nm">58</span>); <span class="cm">// cm</span>
  <span class="fn">delay</span>(<span class="nm">500</span>);
}`,
    circuit: [
      ["HC-SR04 VCC", "→", "5V"],
      ["HC-SR04 GND", "→", "GND"],
      ["HC-SR04 TRIG", "→", "Pin 9"],
      ["HC-SR04 ECHO", "→", "Pin 10"],
    ]
  },
  {
    title: "Buzzer ON/OFF",
    desc: "Beeps buzzer with 500ms on/off cycle",
    code: `<span class="ty">int</span> buz = <span class="nm">8</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(buz, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="fn">digitalWrite</span>(buz, HIGH); <span class="fn">delay</span>(<span class="nm">500</span>);
  <span class="fn">digitalWrite</span>(buz, LOW);  <span class="fn">delay</span>(<span class="nm">500</span>);
}`,
    circuit: [
      ["Buzzer (+)", "→", "Pin 8"],
      ["Buzzer (−)", "→", "GND"],
      ["Note", "→", "Active buzzer only (no resistor needed)"],
    ]
  },
  {
    title: "RGB LED Color Cycle",
    desc: "Cycles through Red → Green → Blue",
    code: `<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(<span class="nm">9</span>, OUTPUT);
  <span class="fn">pinMode</span>(<span class="nm">10</span>, OUTPUT);
  <span class="fn">pinMode</span>(<span class="nm">11</span>, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="fn">analogWrite</span>(<span class="nm">9</span>,<span class="nm">255</span>); <span class="fn">analogWrite</span>(<span class="nm">10</span>,<span class="nm">0</span>);   <span class="fn">analogWrite</span>(<span class="nm">11</span>,<span class="nm">0</span>);
  <span class="fn">delay</span>(<span class="nm">1000</span>);
  <span class="fn">analogWrite</span>(<span class="nm">9</span>,<span class="nm">0</span>);   <span class="fn">analogWrite</span>(<span class="nm">10</span>,<span class="nm">255</span>); <span class="fn">analogWrite</span>(<span class="nm">11</span>,<span class="nm">0</span>);
  <span class="fn">delay</span>(<span class="nm">1000</span>);
  <span class="fn">analogWrite</span>(<span class="nm">9</span>,<span class="nm">0</span>);   <span class="fn">analogWrite</span>(<span class="nm">10</span>,<span class="nm">0</span>);   <span class="fn">analogWrite</span>(<span class="nm">11</span>,<span class="nm">255</span>);
  <span class="fn">delay</span>(<span class="nm">1000</span>);
}`,
    circuit: [
      ["RGB RED pin", "→", "220Ω → Pin 9"],
      ["RGB GREEN pin", "→", "220Ω → Pin 10"],
      ["RGB BLUE pin", "→", "220Ω → Pin 11"],
      ["RGB Common Cathode", "→", "GND"],
    ]
  },
  {
    title: "DHT11 Temperature & Humidity",
    desc: "Reads temp & humidity and prints to Serial Monitor",
    code: `<span class="pp">#include</span> &lt;DHT.h&gt;

<span class="pp">#define</span> DHTPIN <span class="nm">7</span>
<span class="pp">#define</span> DHTTYPE DHT11
DHT dht(DHTPIN, DHTTYPE);

<span class="kw">void</span> <span class="fn">setup</span>() {
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
  dht.<span class="fn">begin</span>();
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">float</span> h = dht.<span class="fn">readHumidity</span>();
  <span class="ty">float</span> t = dht.<span class="fn">readTemperature</span>();
  Serial.<span class="fn">print</span>(<span class="st">"Temp: "</span>); Serial.<span class="fn">print</span>(t);
  Serial.<span class="fn">print</span>(<span class="st">"°C  Humidity: "</span>); Serial.<span class="fn">println</span>(h);
  <span class="fn">delay</span>(<span class="nm">2000</span>);
}`,
    circuit: [
      ["DHT11 VCC", "→", "5V"],
      ["DHT11 GND", "→", "GND"],
      ["DHT11 DATA", "→", "Pin 7"],
      ["10kΩ pull-up resistor", "→", "Between DATA and 5V"],
    ]
  },
  {
    title: "PIR Motion Sensor",
    desc: "Turns LED ON when motion is detected",
    code: `<span class="ty">int</span> pir = <span class="nm">7</span>;
<span class="ty">int</span> led = <span class="nm">13</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(pir, INPUT);
  <span class="fn">pinMode</span>(led, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> state = <span class="fn">digitalRead</span>(pir);
  <span class="kw">if</span> (state == HIGH) {
    <span class="fn">digitalWrite</span>(led, HIGH);
    Serial.<span class="fn">println</span>(<span class="st">"Motion Detected!"</span>);
  } <span class="kw">else</span> {
    <span class="fn">digitalWrite</span>(led, LOW);
  }
  <span class="fn">delay</span>(<span class="nm">200</span>);
}`,
    circuit: [
      ["PIR VCC", "→", "5V"],
      ["PIR GND", "→", "GND"],
      ["PIR OUT", "→", "Pin 7"],
      ["LED Anode", "→", "Pin 13 (built-in LED)"],
    ]
  },
  {
    title: "LDR Light Sensor",
    desc: "Turns LED on in darkness using LDR",
    code: `<span class="ty">int</span> led = <span class="nm">13</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(led, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> light = <span class="fn">analogRead</span>(A0);
  Serial.<span class="fn">println</span>(light);
  <span class="kw">if</span> (light < <span class="nm">400</span>) {      <span class="cm">// Dark threshold</span>
    <span class="fn">digitalWrite</span>(led, HIGH);
  } <span class="kw">else</span> {
    <span class="fn">digitalWrite</span>(led, LOW);
  }
  <span class="fn">delay</span>(<span class="nm">200</span>);
}`,
    circuit: [
      ["LDR one leg", "→", "5V"],
      ["LDR other leg", "→", "A0  +  10kΩ to GND (voltage divider)"],
      ["LED Anode", "→", "220Ω → Pin 13"],
      ["LED Cathode", "→", "GND"],
    ]
  },
  {
    title: "Push Button Counter",
    desc: "Counts button presses and displays on Serial Monitor",
    code: `<span class="ty">int</span> btn = <span class="nm">2</span>;
<span class="ty">int</span> count = <span class="nm">0</span>;
<span class="ty">int</span> lastState = LOW;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(btn, INPUT_PULLUP);
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="ty">int</span> state = <span class="fn">digitalRead</span>(btn);
  <span class="kw">if</span> (state == LOW && lastState == HIGH) {
    count++;
    Serial.<span class="fn">print</span>(<span class="st">"Count: "</span>);
    Serial.<span class="fn">println</span>(count);
  }
  lastState = state;
  <span class="fn">delay</span>(<span class="nm">50</span>); <span class="cm">// debounce</span>
}`,
    circuit: [
      ["Push button one leg", "→", "Pin 2"],
      ["Push button other leg", "→", "GND"],
      ["No resistor needed", "→", "INPUT_PULLUP used internally"],
    ]
  },
  {
    title: "IR Remote Receiver",
    desc: "Reads IR remote codes and prints them to Serial Monitor",
    code: `<span class="pp">#include</span> &lt;IRremote.h&gt;

<span class="ty">int</span> recv = <span class="nm">11</span>;
IRrecv ir(recv);
decode_results res;

<span class="kw">void</span> <span class="fn">setup</span>() {
  Serial.<span class="fn">begin</span>(<span class="nm">9600</span>);
  ir.<span class="fn">enableIRIn</span>();
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="kw">if</span> (ir.<span class="fn">decode</span>(&res)) {
    Serial.<span class="fn">println</span>(res.value, HEX);
    ir.<span class="fn">resume</span>();
  }
}`,
    circuit: [
      ["IR Receiver VCC", "→", "5V"],
      ["IR Receiver GND", "→", "GND"],
      ["IR Receiver OUT", "→", "Pin 11"],
      ["Library needed", "→", "IRremote by shirriff"],
    ]
  }
];

const container = document.getElementById('programs');

programs.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  const circuitRows = p.circuit.map(([pin, arrow, comp]) =>
    `<div class="circuit-row">
      <span class="pin">${pin}</span>
      <span class="arrow">${arrow}</span>
      <span class="component">${comp}</span>
    </div>`
  ).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="ex-num">EX ${String(i+1).padStart(2,'0')}</span>
      <div class="card-header-text">
        <h2>${p.title}</h2>
        <div class="desc">${p.desc}</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="code" data-card="${i}">Code</div>
      <div class="tab" data-tab="circuit" data-card="${i}">Circuit</div>
    </div>
    <div class="tab-content active" id="code-${i}">
      <pre id="raw-${i}">${p.code}</pre>
    </div>
    <div class="tab-content" id="circuit-${i}">
      <div class="circuit-box">
        <div class="circuit-title">Wiring Configuration</div>
        ${circuitRows}
      </div>
    </div>
    <div class="card-footer">
      <button class="copy-btn" id="btn-${i}" onclick="copyCode(${i})">⎘ Copy Code</button>
    </div>
  `;
  container.appendChild(card);
});

// Tab switching
document.addEventListener('click', (e) => {
  if (!e.target.classList.contains('tab')) return;
  const card = e.target.dataset.card;
  const tab = e.target.dataset.tab;
  const cardEl = e.target.closest('.card');

  cardEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  cardEl.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

  e.target.classList.add('active');
  document.getElementById(`${tab}-${card}`).classList.add('active');
});

function copyCode(i) {
  const pre = document.getElementById(`raw-${i}`);
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`btn-${i}`);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘ Copy Code';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
